spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        - id: transaction-service
          uri: http://transaction-service:8082
          predicates:
            - Path=/api/transactions/**
        - id: budget-service
          uri: http://budget-service:8083
          predicates:
            - Path=/api/budgets/**
        - id: reporting-service
          uri: http://reporting-service:8084
          predicates:
            - Path=/api/reports/**
        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/notifications/**
        - id: sync-service
          uri: http://sync-service:8086
          predicates:
            - Path=/api/sync/**

server:
  port: 8080
